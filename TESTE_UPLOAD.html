<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>DSYSTEM AR API - Teste Upload</title>
  <style>
    body{font-family:Arial;background:#0f172a;color:white;padding:32px}
    form{max-width:520px;background:#111827;padding:24px;border-radius:16px}
    label{display:block;margin-top:12px;font-weight:bold}
    input,button{width:100%;padding:12px;margin-top:6px;border-radius:10px;border:0}
    button{background:#16a34a;color:white;font-weight:bold;margin-top:18px}
    pre{background:#020617;padding:16px;border-radius:12px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>DSYSTEM AR API - Teste Upload</h1>
  <form id="form">
    <label>Arquivo</label>
    <input name="file" type="file" required>
    <label>Instalação</label>
    <input name="instalacao">
    <label>Medidor</label>
    <input name="medidor">
    <label>Nome Cliente</label>
    <input name="nome_cliente">
    <label>Operador Usuário</label>
    <input name="operador_usuario">
    <label>Operador Nome</label>
    <input name="operador_nome">
    <button>Enviar</button>
  </form>
  <h3>Resposta</h3>
  <pre id="out"></pre>
  <script>
    form.onsubmit = async e => {
      e.preventDefault();
      const fd = new FormData(form);
      const r = await fetch('/api/upload', {method:'POST', body:fd});
      out.textContent = JSON.stringify(await r.json(), null, 2);
    }
  </script>
</body>
</html>
